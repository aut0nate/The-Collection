services:
  app:
    build:
      context: .
    container_name: the-collection-local
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - the-collection-data:/app/data
    logging:
      options:
        max-size: 10m
        max-file: "3"

volumes:
  the-collection-data:
