services:
  app:
    build:
      context: .
    container_name: the-collection-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      DATABASE_URL: file:/app/data/the-collection.db
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/app/data
    logging:
      options:
        max-size: 10m
        max-file: "3"
