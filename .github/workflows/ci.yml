name: CI - Validate and build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI_IMAGE_TAG: the-collection:ci

jobs:
  validate-and-build:
    name: Validate and build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run typecheck

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build -t "${CI_IMAGE_TAG}" .

      - name: Smoke test Docker image
        run: |
          set -euo pipefail

          docker run --detach --name the-collection-smoke \
            --publish 3000:3000 \
            --env ADMIN_USERNAME=ci-admin \
            --env ADMIN_PASSWORD_HASH='$2a$10$6QqB0Y7MY0lFxK5vT3H6I.gxxtqkS28meE2gXApVGyr3ZwCwRQiwK' \
            --env SESSION_SECRET=ci-session-secret-that-is-long-enough-for-tests \
            "${CI_IMAGE_TAG}"

          for attempt in {1..30}; do
            if docker exec the-collection-smoke wget -qO- http://127.0.0.1:3000/ >/dev/null; then
              docker logs the-collection-smoke
              exit 0
            fi
            sleep 2
          done

          docker logs the-collection-smoke
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm --force the-collection-smoke || true
