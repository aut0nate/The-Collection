name: CD - Build and deploy

on:
  workflow_run:
    workflows:
      - CI - Validate and build
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/aut0nate/the-collection
  DEPLOY_PATH: /opt/stacks/the-collection

jobs:
  build-and-push:
    name: Build and push image
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: docker build -t "${IMAGE_NAME}:latest" .

      - name: Tag image with commit SHA
        run: docker tag "${IMAGE_NAME}:latest" "${IMAGE_NAME}:${{ github.event.workflow_run.head_sha }}"

      - name: Push images
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ github.event.workflow_run.head_sha }}"

  deploy:
    name: Deploy to production server
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare deployment directory
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${DEPLOY_PATH}' && test -w '${DEPLOY_PATH}' || { echo 'Deployment path is not writable by the SSH deploy user: ${DEPLOY_PATH}' >&2; exit 1; }"

      - name: Upload production Compose file
        run: |
          scp -i ~/.ssh/deploy_key \
            -P "${{ secrets.VPS_PORT }}" \
            docker-compose.prod.yaml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${DEPLOY_PATH}/docker-compose.yaml"

      - name: Deploy container
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
          set -e

          cd "${DEPLOY_PATH}"

          if [ ! -f .env ]; then
            echo "Missing ${DEPLOY_PATH}/.env on the server. Create it with the production runtime values before deploying." >&2
            exit 1
          fi

          if grep -q '^IMAGE_TAG=' .env; then
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.event.workflow_run.head_sha }}/" .env
          else
            printf '\\nIMAGE_TAG=%s\\n' "${{ github.event.workflow_run.head_sha }}" >> .env
          fi

          docker compose pull
          docker compose up -d
          docker image prune -f
          docker compose ps
          EOF
